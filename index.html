<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon TCG Mega Knowledge Base</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f13;--card:#1a1a24;--border:#2a2a3a;--text:#e0e0e8;--muted:#888899;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--gold:#eab308}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent2);text-decoration:none}a:hover{text-decoration:underline}

.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:700;white-space:nowrap}
.header h1 span{color:var(--accent2)}
.search-box{flex:1;min-width:200px;max-width:480px;position:relative}
.search-box input{width:100%;padding:10px 14px 10px 38px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--accent)}
.search-box::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5}
.stats{font-size:13px;color:var(--muted);white-space:nowrap}

.container{max-width:1200px;margin:0 auto;padding:20px}

.filter-section{margin-bottom:16px}
.filter-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;font-weight:600}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;white-space:nowrap}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab .cnt{font-size:10px;opacity:.6;margin-left:4px}

.set-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.set-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.set-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(99,102,241,.15)}
.set-card .sname{font-weight:600;font-size:15px;margin-bottom:4px}
.set-card .smeta{display:flex;gap:12px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.set-card .lang-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase}
.lang-en{background:rgba(99,102,241,.2);color:var(--accent2)}
.lang-cn{background:rgba(239,68,68,.2);color:var(--red)}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.card-item{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .2s;cursor:pointer}
.card-item:hover{border-color:var(--accent);transform:translateY(-2px)}
.card-img{aspect-ratio:200/277;background:#111;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s}
.card-img img.ok{opacity:1}
.card-info{padding:10px 12px}
.card-info .cname{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-info .cmeta{font-size:11px;color:var(--muted);margin-top:2px}
.card-info .cprice{font-size:14px;font-weight:700;color:var(--green);margin-top:4px}
.card-info .cprice.na{color:var(--muted);font-weight:400}
.card-info .crarity{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:rgba(234,179,8,.15);color:var(--gold);margin-top:4px}

.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;cursor:pointer;margin-bottom:16px}
.back-btn:hover{border-color:var(--accent)}

.sort-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.sort-bar label{font-size:13px;color:var(--muted)}
.sort-bar select{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:13px}
.result-count{font-size:13px;color:var(--muted);margin-left:auto}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty p{font-size:16px;margin-bottom:8px}

.pagination{display:flex;justify-content:center;gap:8px;margin-top:20px;flex-wrap:wrap}
.pagination button{padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-size:13px}
.pagination button:hover{border-color:var(--accent)}
.pagination button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pagination button:disabled{opacity:.4;cursor:default}

.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.detail-overlay.open{display:flex}
.detail-panel{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.detail-close{position:absolute;top:12px;right:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:10}
.detail-close:hover{border-color:var(--accent)}
.detail-body{display:flex;gap:24px;padding:24px;flex-wrap:wrap}
.detail-img{flex:0 0 220px}
.detail-img img{width:100%;border-radius:12px}
.detail-info{flex:1;min-width:200px}
.detail-info h2{font-size:22px;font-weight:700;margin-bottom:4px}
.detail-info .field{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.detail-info .field .label{color:var(--muted)}
.detail-info .field .val{font-weight:600}
.detail-info .field .val.price{color:var(--green);font-size:18px}
.detail-info .ebay-link{display:inline-block;margin-top:16px;padding:10px 20px;background:var(--accent);color:#fff;border-radius:8px;font-weight:600;font-size:14px}
.detail-info .ebay-link:hover{background:var(--accent2);text-decoration:none}
.psa-bar{display:flex;gap:2px;align-items:flex-end;height:60px;margin-top:8px}
.psa-bar .grade-col{flex:1;background:var(--border);border-radius:3px 3px 0 0;position:relative;display:flex;flex-direction:column;justify-content:flex-end;align-items:center}
.psa-bar .grade-col .bar{width:100%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px}
.psa-bar .grade-col span{font-size:8px;color:var(--muted);margin-top:2px}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.section-title{font-size:14px;color:var(--muted);margin:20px 0 10px;font-weight:600}

@media(max-width:600px){
  .header{padding:12px 16px}.container{padding:12px}
  .detail-body{flex-direction:column;padding:16px}.detail-img{flex:none}
  .set-grid{grid-template-columns:1fr}.card-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
}
</style>
</head>
<body>
<div class="header">
  <h1>Pokemon TCG <span>Mega KB</span></h1>
  <div class="search-box"><input type="text" id="searchInput" placeholder="Search cards, sets, Pokemon... (e.g. Pikachu ex, Base Set, 234)"></div>
  <div class="stats" id="stats"></div>
</div>
<div class="container" id="app">
  <div class="loading-screen" id="loading"><div class="spinner"></div><p>Loading 42K+ cards from unified database...</p></div>
</div>
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<script>
let db=null,activeFilter={cat:'all',val:'all'},currentPage=1,view='home';const PS=60;
async function init(){
  try{const S=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`});
  const r=await fetch('pokemon_kb.db');const b=await r.arrayBuffer();db=new S.Database(new Uint8Array(b));
  updStats();showHome();}catch(e){document.getElementById('loading').innerHTML=`<div class="empty"><p>Failed to load</p><p style="font-size:13px">${e.message}</p></div>`}
}
function updStats(){
  const s=db.exec("SELECT COUNT(*) FROM sets")[0].values[0][0];
  const c=db.exec("SELECT COUNT(*) FROM cards")[0].values[0][0];
  const p=db.exec("SELECT COUNT(DISTINCT card_id) FROM prices")[0].values[0][0];
  const r=db.exec("SELECT COUNT(*) FROM cards WHERE rarity IS NOT NULL AND rarity!=''")[0].values[0][0];
  document.getElementById('stats').textContent=`${s} sets · ${c.toLocaleString()} cards · ${r.toLocaleString()} with rarity · ${p.toLocaleString()} priced`;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function showHome(){
  view='home';activeFilter={cat:'all',val:'all'};currentPage=1;
  const q=s=>db.exec(s)[0].values;
  const eraC={};q("SELECT language,COUNT(*) FROM sets GROUP BY language").forEach(r=>{eraC[r[0]]=r[1]});
  const langC={};q("SELECT source,COUNT(*) FROM cards GROUP BY source").forEach(r=>{langC[r[0]]=r[1]});
  const rarC={};q("SELECT rarity,COUNT(*) FROM cards WHERE rarity IS NOT NULL AND rarity!='' GROUP BY rarity ORDER BY COUNT(*) DESC LIMIT 10").forEach(r=>{rarC[r[0]]=r[1]});
  const priceC={};q("SELECT CASE WHEN p.price_usd>=500 THEN '500+' WHEN p.price_usd>=100 THEN '100+' WHEN p.price_usd>=50 THEN '50+' WHEN p.price_usd>=10 THEN '10+' ELSE '1+' END, COUNT(*) FROM prices p GROUP BY 1 ORDER BY MIN(p.price_usd) DESC").forEach(r=>{priceC[r[0]]=r[1]});

  let h='';
  // Language
  h+=`<div class="filter-section"><div class="filter-label">Language</div><div class="tabs">`;
  h+=mkTab('lang','all','All',eraC.en+eraC['zh-CN']||0);
  h+=mkTab('lang','en','English',eraC.en||0);
  h+=mkTab('lang','zh-CN','Chinese',eraC['zh-CN']||0);
  h+=`</div></div>`;
  // Source
  h+=`<div class="filter-section"><div class="filter-label">Source</div><div class="tabs">`;
  h+=mkTab('src','all','All',Object.values(langC).reduce((a,b)=>a+b,0));
  [['tcgdex','TCGDex'],['tcgdex+csv','TCGDex+CSV'],['pokemon-card-csv','TradingCardDex'],['pikaqian','PikaQian (CN)'],['gem-pack-vol2','Gem Pack']].forEach(([k,v])=>{
    if(langC[k])h+=mkTab('src',k,v,langC[k]);
  });
  h+=`</div></div>`;
  // Rarity
  h+=`<div class="filter-section"><div class="filter-label">Rarity</div><div class="tabs">`;
  h+=mkTab('rar','all','All',Object.values(rarC).reduce((a,b)=>a+b,0));
  Object.entries(rarC).forEach(([k,v])=>{h+=mkTab('rar',k,k,v)});
  h+=`</div></div>`;
  // Price
  h+=`<div class="filter-section"><div class="filter-label">Price (USD)</div><div class="tabs">`;
  h+=mkTab('price','all','All',Object.values(priceC).reduce((a,b)=>a+b,0));
  [['500+','$500+'],['100+','$100+'],['50+','$50+'],['10+','$10+'],['1+','$1+']].forEach(([k,v])=>{
    if(priceC[k])h+=mkTab('price',k,v,priceC[k]);
  });
  h+=`</div></div>`;
  // PSA
  h+=`<div class="filter-section"><div class="filter-label">PSA Graded</div><div class="tabs">`;
  h+=mkTab('psa','all','All',db.exec("SELECT COUNT(*) FROM psa_grades")[0].values[0][0]);
  h+=mkTab('psa','yes','Has PSA Data',db.exec("SELECT COUNT(*) FROM psa_grades WHERE total_graded>0")[0].values[0][0]);
  h+=`</div></div>`;
  h+=`<div style="height:8px"></div><div id="filterOut"></div>`;
  document.getElementById('app').innerHTML=h;
  renderHome();
}
function mkTab(cat,val,label,cnt){return`<div class="tab ${activeFilter.cat===cat&&activeFilter.val===val?'active':''}" onclick="setF('${cat}','${val}')">${esc(label)}<span class="cnt">${typeof cnt==='number'?cnt.toLocaleString():''}</span></div>`}
function setF(cat,val){activeFilter={cat,val};currentPage=1;showHome()}

function renderHome(){
  const af=activeFilter;let w=[];
  if(af.cat==='lang'&&af.val!=='all')w.push(`s.language='${af.val}'`);
  if(af.cat==='src'&&af.val!=='all')w.push(`c.source='${af.val}'`);
  if(af.cat==='rar'&&af.val!=='all')w.push(`c.rarity='${af.val.replace(/'/g,"''")}'`);
  if(af.cat==='price'&&af.val!=='all'){
    const mn=parseInt(af.val);w.push(`p.price_usd>=${mn}`);
  }
  if(af.cat==='psa'&&af.val==='yes')w.push(`pg.card_id IS NOT NULL`);

  let join=`FROM cards c JOIN sets s ON c.set_id=s.set_id`;
  if(af.cat==='price')join+=` JOIN prices p ON c.card_id=p.card_id`;
  if(af.cat==='psa')join+=` LEFT JOIN psa_grades pg ON c.card_id=pg.card_id`;

  const where=w.length?'WHERE '+w.join(' AND '):'';
  const countQ=db.exec(`SELECT COUNT(DISTINCT c.card_id) ${join} ${where}`)[0].values[0][0];
  const tp=Math.ceil(countQ/PS),off=(currentPage-1)*PS;

  let q=`SELECT DISTINCT c.card_id, c.name, c.local_id, c.rarity, c.image_url, c.source, s.name as sname, s.language, s.set_id`;
  if(af.cat==='price')q+=`, p.price_usd`;
  q+=` ${join} ${where} ORDER BY `;
  if(af.cat==='price')q+=`p.price_usd DESC`;
  else q+=`s.release_date DESC, CAST(c.local_id AS INTEGER)`;
  q+=` LIMIT ${PS} OFFSET ${off}`;

  const cards=db.exec(q);
  const el=document.getElementById('filterOut');
  let h=`<div class="section-title">CARDS (${countQ.toLocaleString()})</div>`;
  h+=`<div class="card-grid" id="cardGrid"></div><div class="pagination" id="pagination"></div>`;
  el.innerHTML=h;

  if(!cards.length||!cards[0].values.length){
    document.getElementById('cardGrid').innerHTML='<div class="empty"><p>No cards match this filter</p></div>';
    document.getElementById('pagination').innerHTML='';return;
  }

  const cols=cards[0].columns;
  document.getElementById('cardGrid').innerHTML=cards[0].values.map(r=>{
    const o={};cols.forEach((c,i)=>o[c]=r[i]);
    const img=o.image_url||'';
    const priceIdx=cols.indexOf('price_usd');
    const price=priceIdx>=0?r[priceIdx]:null;
    const priceStr=price?`$${parseFloat(price).toLocaleString(undefined,{minimumFractionDigits:2})}`:'';
    const lang=o.language||'en';
    return`<div class="card-item" onclick="openCard('${esc(o.card_id)}')">
      <div class="card-img">${img?`<img src="${img}.png" onload="this.classList.add('ok')" onerror="this.src='${img}.webp'">`:''}</div>
      <div class="card-info">
        <div class="cname" title="${esc(o.name)}">${esc(o.name)}</div>
        <div class="cmeta">#${o.local_id||'?'} · ${esc(o.sname||'')} <span class="lang-badge lang-${lang}">${lang}</span></div>
        ${o.rarity?`<div class="crarity">${esc(o.rarity)}</div>`:''}
        ${priceStr?`<div class="cprice">${priceStr}</div>`:''}
      </div>
    </div>`}).join('');

  let pg='';
  if(tp>1){
    pg+=mkPg(1,'«')+mkPg(currentPage-1,'‹');
    for(let i=Math.max(1,currentPage-2);i<=Math.min(tp,currentPage+2);i++)pg+=mkPg(i,i);
    pg+=mkPg(currentPage+1,'›')+mkPg(tp,'»');
  }
  document.getElementById('pagination').innerHTML=pg;
}
function mkPg(p,t){return`<button ${p<1||p>Math.ceil(99999)?'disabled':''} class="${p===currentPage?'active':''}" onclick="currentPage=${p};renderHome()">${t}</button>`}

function openCard(id){
  const c=db.exec(`SELECT c.*, s.name as sname, s.language, s.release_date, s.series
    FROM cards c JOIN sets s ON c.set_id=s.set_id WHERE c.card_id='${id.replace(/'/g,"''")}'`)[0];
  if(!c)return;
  const o={};c.columns.forEach((col,i)=>o[col]=c.values[0][i]);

  const price=db.exec(`SELECT source,price_usd,condition FROM prices WHERE card_id='${id.replace(/'/g,"''")}' ORDER BY price_usd DESC`);
  const psa=db.exec(`SELECT * FROM psa_grades WHERE card_id='${id.replace(/'/g,"''")}'`);

  let h=`<button class="detail-close" onclick="closeDetail()">✕</button><div class="detail-body">`;
  h+=`<div class="detail-img">${o.image_url?`<img src="${o.image_url}.png" onerror="this.src='${o.image_url}.webp'">`:''}</div>`;
  h+=`<div class="detail-info">`;
  h+=`<h2>${esc(o.name)}</h2>`;
  h+=mkF('Set',o.sname);
  h+=mkF('Set ID',o.set_id);
  h+=mkF('Card Number','#'+(o.local_id||'?'));
  if(o.rarity)h+=mkF('Rarity',o.rarity);
  if(o.language)h+=mkF('Language',o.language==='en'?'English':'Simplified Chinese');
  if(o.release_date)h+=mkF('Release Date',o.release_date);
  if(o.series)h+=mkF('Series',o.series);

  if(price.values.length){
    const best=price.values[0];
    h+=mkF('Market Price',`$${parseFloat(best[1]).toLocaleString(undefined,{minimumFractionDigits:2})}`,true);
    h+=mkF('Source',best[0]);
  }

  if(psa.values.length){
    const p={};psa.columns.forEach((col,i)=>p[col]=psa.values[0][i]);
    h+=`<div style="margin-top:16px"><div style="font-weight:600;margin-bottom:8px">PSA Grading (${p.total_graded?.toLocaleString()} total)</div>`;
    h+=`<div class="psa-bar">`;
    for(let g=1;g<=10;g++){
      const v=p['grade_'+g]||0;
      const pct=p.total_graded?(v/p.total_graded*100):0;
      h+=`<div class="grade-col"><div class="bar" style="height:${Math.max(pct,2)}%"></div><span>${g}</span></div>`;
    }
    h+=`</div>`;
    if(p.gem_mint_pct)h+=`<div style="font-size:12px;color:var(--muted);margin-top:4px">PSA 10: ${p.gem_mint_pct}% · Avg Grade: ${p.average_grade||'N/A'}</div>`;
    h+=`</div>`;
  }

  const ebayUrl=`https://www.ebay.com/sch/i.html?_nkw=${encodeURIComponent((o.name||'')+' '+(o.local_id||''))}&_nacat=0&LH_BIN=1`;
  h+=`<a class="ebay-link" href="${ebayUrl}" target="_blank" rel="noopener">View on eBay</a>`;
  h+=`</div></div>`;

  document.getElementById('detailPanel').innerHTML=h;
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function mkF(label,val,isPrice){return`<div class="field"><span class="label">${label}</span><span class="val${isPrice?' price':''}">${esc(String(val))}</span></div>`}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('open');document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});

// Search
let sTimer=null;
document.getElementById('searchInput').addEventListener('input',e=>{
  clearTimeout(sTimer);sTimer=setTimeout(()=>{
    const q=e.target.value.trim();
    if(q.length<2){if(view==='search')showHome();return}
    view='search';currentPage=1;renderSearch(q);
  },300);
});

function renderSearch(q){
  view='search';const s=q.replace(/'/g,"''");
  const sort=document.getElementById('sortSel')?.value||'relevance';
  const sortMap={relevance:'1',price:'p.price_usd DESC',name:'c.name',set:'s.name'};

  // Search sets
  const matchedSets=db.exec(`SELECT set_id, name, language, card_count_total FROM sets WHERE name LIKE '%${s}%' OR set_id LIKE '%${s}%' ORDER BY release_date DESC`);

  // Search cards
  const cardW=`c.name LIKE '%${s}%' OR c.local_id LIKE '%${s}%' OR c.set_id LIKE '%${s}%' OR s.name LIKE '%${s}%'`;
  const join=`FROM cards c JOIN sets s ON c.set_id=s.set_id LEFT JOIN prices p ON c.card_id=p.card_id`;
  const cardCount=db.exec(`SELECT COUNT(DISTINCT c.card_id) ${join} WHERE ${cardW}`)[0].values[0][0];
  const tp=Math.ceil(cardCount/PS),off=(currentPage-1)*PS;

  const orderBy=sort==='price'?'p.price_usd DESC':sort==='name'?'c.name':sort==='set'?'s.name,c.local_id':'1';
  const cards=db.exec(`SELECT DISTINCT c.card_id, c.name, c.local_id, c.rarity, c.image_url, c.source, s.name as sname, s.language, p.price_usd ${join} WHERE ${cardW} ORDER BY ${orderBy} LIMIT ${PS} OFFSET ${off}`);

  let h=`<div class="back-btn" onclick="document.getElementById('searchInput').value='';showHome()">← Back</div>`;
  h+=`<div style="margin-bottom:16px"><h2 style="font-size:20px">Search: "${esc(q)}"</h2>`;
  h+=`<div style="font-size:13px;color:var(--muted);margin-top:4px">${matchedSets.values?matchedSets[0].values.length:0} sets · ${cardCount.toLocaleString()} cards</div></div>`;

  // Sets
  if(matchedSets.length&&matchedSets[0].values.length){
    h+=`<div class="section-title">SETS</div><div class="set-grid" style="margin-bottom:24px">`;
    matchedSets[0].values.forEach(r=>{
      const lang=r[2]||'en';
      h+=`<div class="set-card" onclick="openSet('${esc(r[0])}')">
        <div class="sname">${esc(r[1])} <span class="lang-badge lang-${lang}">${lang}</span></div>
        <div class="smeta"><span>${r[0]}</span><span>${r[3]||'?'} cards</span></div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Cards
  h+=`<div class="section-title">CARDS</div>`;
  h+=`<div class="sort-bar"><label>Sort:</label><select id="sortSel" onchange="renderSearch('${esc(q).replace(/'/g,"\\'")}')">`;
  ['relevance','price','name','set'].forEach(v=>{h+=`<option value="${v}" ${sort===v?'selected':''}>${v.charAt(0).toUpperCase()+v.slice(1)}</option>`});
  h+=`</select><span class="result-count">${cardCount.toLocaleString()} cards</span></div>`;
  h+=`<div class="card-grid" id="cardGrid"></div><div class="pagination" id="pagination"></div>`;
  document.getElementById('app').innerHTML=h;

  if(!cards.length||!cards[0].values.length){
    document.getElementById('cardGrid').innerHTML='<div class="empty"><p>No cards found</p></div>';
    document.getElementById('pagination').innerHTML='';return;
  }

  const cols=cards[0].columns;
  document.getElementById('cardGrid').innerHTML=cards[0].values.map(r=>{
    const o={};cols.forEach((c,i)=>o[c]=r[i]);
    const img=o.image_url||'';
    const price=o.price_usd;
    const priceStr=price?`$${parseFloat(price).toLocaleString(undefined,{minimumFractionDigits:2})}`:'';
    const lang=o.language||'en';
    return`<div class="card-item" onclick="openCard('${esc(o.card_id)}')">
      <div class="card-img">${img?`<img src="${img}.png" onload="this.classList.add('ok')" onerror="this.src='${img}.webp'">`:''}</div>
      <div class="card-info">
        <div class="cname" title="${esc(o.name)}">${esc(o.name)}</div>
        <div class="cmeta">#${o.local_id||'?'} · ${esc(o.sname||'')} <span class="lang-badge lang-${lang}">${lang}</span></div>
        ${o.rarity?`<div class="crarity">${esc(o.rarity)}</div>`:''}
        ${priceStr?`<div class="cprice">${priceStr}</div>`:''}
      </div>
    </div>`}).join('');

  let pg='';
  if(tp>1){
    pg+=`<button ${currentPage===1?'disabled':''} onclick="currentPage=1;renderSearch('${esc(q).replace(/'/g,"\\'")}')">«</button>`;
    pg+=`<button ${currentPage===1?'disabled':''} onclick="currentPage--;renderSearch('${esc(q).replace(/'/g,"\\'")}')">‹</button>`;
    for(let i=Math.max(1,currentPage-2);i<=Math.min(tp,currentPage+2);i++)
      pg+=`<button class="${i===currentPage?'active':''}" onclick="currentPage=${i};renderSearch('${esc(q).replace(/'/g,"\\'")}')">${i}</button>`;
    pg+=`<button ${currentPage===tp?'disabled':''} onclick="currentPage++;renderSearch('${esc(q).replace(/'/g,"\\'")}')">›</button>`;
    pg+=`<button ${currentPage===tp?'disabled':''} onclick="currentPage=${tp};renderSearch('${esc(q).replace(/'/g,"\\'")}')">»</button>`;
  }
  document.getElementById('pagination').innerHTML=pg;
  window.scrollTo({top:0,behavior:'smooth'});
}

function openSet(setId){
  view='set';currentPage=1;
  const s=db.exec(`SELECT * FROM sets WHERE set_id='${setId.replace(/'/g,"''")}'`)[0];
  if(!s)return;
  const o={};s.columns.forEach((c,i)=>o[c]=s.values[0][i]);

  const cardCount=db.exec(`SELECT COUNT(*) FROM cards WHERE set_id='${setId.replace(/'/g,"''")}'`)[0].values[0][0];

  let h=`<div class="back-btn" onclick="showHome()">← Back</div>`;
  h+=`<div style="margin-bottom:20px">`;
  h+=`<h2 style="font-size:24px">${esc(o.name)} <span class="lang-badge lang-${o.language||'en'}">${o.language||'en'}</span></h2>`;
  h+=`<div style="font-size:13px;color:var(--muted);margin-top:4px">${o.set_id} · ${o.release_date||'?'} · ${cardCount} cards · Source: ${o.source}</div>`;
  if(o.logo_url)h+=`<img src="${o.logo_url}" style="height:60px;margin-top:12px">`;
  h+=`</div>`;
  h+=`<div class="card-grid" id="cardGrid"></div><div class="pagination" id="pagination"></div>`;
  document.getElementById('app').innerHTML=h;
  renderSet(setId);
}
function renderSet(setId){
  const tp=Math.ceil(db.exec(`SELECT COUNT(*) FROM cards WHERE set_id='${setId.replace(/'/g,"''")}'`)[0].values[0][0]/PS);
  const off=(currentPage-1)*PS;
  const cards=db.exec(`SELECT c.*, p.price_usd FROM cards c LEFT JOIN prices p ON c.card_id=p.card_id WHERE c.set_id='${setId.replace(/'/g,"''")}' ORDER BY CAST(c.local_id AS INTEGER) LIMIT ${PS} OFFSET ${off}`);

  if(!cards.length||!cards[0].values.length){
    document.getElementById('cardGrid').innerHTML='<div class="empty"><p>No cards</p></div>';return;
  }

  const cols=cards[0].columns;
  document.getElementById('cardGrid').innerHTML=cards[0].values.map(r=>{
    const o={};cols.forEach((c,i)=>o[c]=r[i]);
    const img=o.image_url||'';const price=o.price_usd;
    const priceStr=price?`$${parseFloat(price).toLocaleString(undefined,{minimumFractionDigits:2})}`:'';
    return`<div class="card-item" onclick="openCard('${esc(o.card_id)}')">
      <div class="card-img">${img?`<img src="${img}.png" onload="this.classList.add('ok')" onerror="this.src='${img}.webp'">`:''}</div>
      <div class="card-info">
        <div class="cname">${esc(o.name)}</div>
        <div class="cmeta">#${o.local_id||'?'}${o.rarity?' · '+esc(o.rarity):''}</div>
        ${priceStr?`<div class="cprice">${priceStr}</div>`:''}
      </div>
    </div>`}).join('');

  let pg='';
  if(tp>1){
    pg+=`<button ${currentPage===1?'disabled':''} onclick="currentPage=1;renderSet('${setId}')">«</button>`;
    pg+=`<button ${currentPage===1?'disabled':''} onclick="currentPage--;renderSet('${setId}')">‹</button>`;
    for(let i=Math.max(1,currentPage-2);i<=Math.min(tp,currentPage+2);i++)
      pg+=`<button class="${i===currentPage?'active':''}" onclick="currentPage=${i};renderSet('${setId}')">${i}</button>`;
    pg+=`<button ${currentPage===tp?'disabled':''} onclick="currentPage++;renderSet('${setId}')">›</button>`;
    pg+=`<button ${currentPage===tp?'disabled':''} onclick="currentPage=${tp};renderSet('${setId}')">»</button>`;
  }
  document.getElementById('pagination').innerHTML=pg;
}

init();
</script>
